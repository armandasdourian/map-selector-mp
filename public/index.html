<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAP SELECTOR // MULTIPLAYER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Lexend+Deca:wght@700;800;900&family=Urbanist:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --red:#ff4655;--red-dim:#ff465540;--red-glow:#ff465530;
  --teal:#17dec5;--teal-dim:#17dec540;--teal-glow:#17dec530;
  --dark:#0f1923;--darker:#0a1118;--darkest:#060d13;
  --panel:#1a2332;--panel2:#1f2b3d;--panel-hi:#253345;
  --text:#ece8e1;--text-dim:#8b8577;--text-mute:#5a5549;
  --gold:#f5c542;--gold-dim:#f5c54240;
  --green:#4ade80;--purple:#a78bfa;--blue:#58b4f0;--orange:#fb923c;
  --fd:'Lexend Deca',sans-serif;--fl:'Urbanist',sans-serif;--fb:'Figtree',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-width:thin;scrollbar-color:var(--red) var(--darker)}
body{font-family:var(--fb);background:var(--darkest);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background:
  repeating-linear-gradient(0deg,transparent,transparent 2px,#ffffff01 2px,#ffffff01 4px),
  radial-gradient(ellipse at 50% 0%,#1a2a3a40 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.02;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:256px}
::selection{background:var(--red);color:#fff}

/* === BUTTONS === */
.btn{padding:10px 24px;font-family:var(--fl);font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;border:1px solid;cursor:pointer;transition:all .3s var(--ease);display:inline-flex;align-items:center;justify-content:center;gap:8px;background:none;color:var(--text);position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#fff1 0%,transparent 50%);opacity:0;transition:opacity .3s}
.btn:hover::before{opacity:1}
.btn-red{background:var(--red);border-color:var(--red);color:#fff}
.btn-red:hover{box-shadow:0 0 30px var(--red-glow),0 4px 20px #0008;transform:translateY(-2px)}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#000}
.btn-teal:hover{box-shadow:0 0 30px var(--teal-glow),0 4px 20px #0008;transform:translateY(-2px)}
.btn-ghost{background:transparent;border-color:#ffffff18;color:var(--text-dim)}
.btn-ghost:hover{border-color:var(--red);color:var(--text);background:#ffffff05}
.btn-sm{padding:6px 14px;font-size:9px;letter-spacing:2px}
.btn-lg{padding:16px 40px;font-size:14px;letter-spacing:3px}
.btn:disabled{opacity:.25;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* === HOME === */
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;position:relative}
.home-tag{font-family:var(--fl);font-size:11px;font-weight:700;letter-spacing:8px;text-transform:uppercase;color:var(--red);margin-bottom:10px;animation:fadeUp .8s var(--ease) .1s both}
.home-title{font-family:var(--fd);font-size:clamp(40px,7vw,72px);font-weight:900;letter-spacing:-1px;text-transform:uppercase;background:linear-gradient(135deg,var(--text) 20%,var(--red) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 4px 30px #ff465520);animation:fadeUp .9s var(--ease) .2s both}
.home-sub{font-size:14px;color:var(--text-dim);margin-top:12px;letter-spacing:.5px;animation:fadeUp .8s var(--ease) .35s both}
.home-forms{display:flex;gap:24px;margin-top:52px;flex-wrap:wrap;justify-content:center;animation:fadeUp .8s var(--ease) .5s both}
.form-card{background:linear-gradient(135deg,var(--panel) 0%,var(--dark) 100%);border:1px solid #ffffff0a;padding:32px;width:290px;backdrop-filter:blur(8px);transition:all .4s var(--ease)}
.form-card:hover{border-color:#ffffff15;transform:translateY(-4px);box-shadow:0 16px 48px #0006}
.form-card h3{font-family:var(--fd);font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;color:var(--text);display:flex;align-items:center;gap:8px}
.form-card h3::before{content:'';width:3px;height:16px;background:var(--red);display:inline-block}
.form-card label{font-family:var(--fl);font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-mute);display:block;margin-bottom:6px}
.form-card input{width:100%;padding:12px 16px;background:var(--darkest);border:1px solid #ffffff10;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;margin-bottom:18px;transition:all .3s}
.form-card input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
.code-input{font-family:var(--fd)!important;font-size:28px!important;font-weight:900!important;letter-spacing:10px!important;text-transform:uppercase;text-align:center;padding:14px 16px!important}

/* === LOBBY === */
.lobby{max-width:960px;margin:0 auto;padding:40px 20px}
.room-header{text-align:center;margin-bottom:36px}
.room-code-label{font-family:var(--fl);font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--text-mute);margin-bottom:6px}
.room-code{font-family:var(--fd);font-size:56px;font-weight:900;letter-spacing:16px;color:var(--text);text-shadow:0 0 40px #ff465510}
.teams-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:36px}
.team-col{background:linear-gradient(180deg,var(--panel) 0%,var(--dark) 100%);border:1px solid #ffffff08;overflow:hidden}
.team-hdr{padding:14px 20px;font-family:var(--fl);font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.team-a .team-hdr{background:linear-gradient(90deg,#17dec510,transparent);color:var(--teal);border-bottom:2px solid var(--teal-dim)}
.team-b .team-hdr{background:linear-gradient(90deg,#ff465510,transparent);color:var(--red);border-bottom:2px solid var(--red-dim)}
.team-hdr::before{content:'';width:8px;height:8px;border-radius:50%}
.team-a .team-hdr::before{background:var(--teal);box-shadow:0 0 8px var(--teal)}
.team-b .team-hdr::before{background:var(--red);box-shadow:0 0 8px var(--red)}
.team-body{padding:12px 20px}
.p-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #ffffff06}
.p-row:last-child{border-bottom:none}
.p-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:11px;font-weight:900;color:#000;flex-shrink:0}
.team-a .p-av{background:var(--teal)}
.team-b .p-av{background:var(--red)}
.p-name{flex:1;font-size:14px;font-weight:600}
.p-badges{display:flex;gap:4px;flex-shrink:0}
.bdg{padding:2px 8px;font-family:var(--fl);font-size:7px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border-radius:2px}
.bdg-cap{background:var(--gold);color:#000}
.bdg-host{background:var(--purple);color:#000}
.bdg-you{background:#ffffff15;color:var(--text-dim)}
.p-ctrls{display:flex;gap:4px;flex-shrink:0}
.sys-label{font-family:var(--fl);font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--text-mute);margin-bottom:12px;text-align:center}
.sys-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px}
.sys-card{background:var(--panel);border:2px solid #ffffff08;padding:16px 20px;cursor:pointer;transition:all .4s var(--ease);text-align:center;min-width:130px;position:relative;overflow:hidden}
.sys-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,#ffffff05,transparent);opacity:0;transition:opacity .3s}
.sys-card:hover{border-color:#ffffff18;transform:translateY(-3px);box-shadow:0 8px 24px #0004}
.sys-card:hover::before{opacity:1}
.sys-card.active{border-color:var(--red);background:linear-gradient(135deg,#ff465512,#ff465504);box-shadow:0 0 24px var(--red-glow)}
.sys-icon{font-size:24px;margin-bottom:6px;opacity:.8}
.sys-name{font-family:var(--fd);font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.sys-desc{text-align:center;margin:0 0 24px;padding:16px 24px;background:var(--panel);border-left:3px solid var(--red);font-size:13px;color:var(--text-dim);line-height:1.75}
.cfg-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;flex-wrap:wrap}
.cfg-label{font-family:var(--fl);font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-mute)}

/* === GAME === */
.game{max-width:1200px;margin:0 auto;padding:28px 20px}
.g-hdr{text-align:center;margin-bottom:16px}
.g-title{font-family:var(--fd);font-size:28px;font-weight:900;letter-spacing:3px;text-transform:uppercase}
.g-sub{font-family:var(--fl);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-top:6px}

/* NUDGE BAR */
.nl-bar{display:flex;gap:4px;justify-content:center;margin:14px 0 18px;flex-wrap:wrap;align-items:center}
.nl-label{font-size:8px;color:var(--text-mute);letter-spacing:2px;text-transform:uppercase;padding:6px 8px 6px 0}
.nl-btn{padding:7px 14px;font-family:var(--fl);font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid #ffffff10;background:var(--dark);color:var(--text-dim);cursor:pointer;transition:all .3s}
.nl-btn:hover:not(:disabled){border-color:#ffffff25}
.nl-btn.nl-on{color:#000}
.nl-btn[data-nl="0"].nl-on{background:var(--text-dim);border-color:var(--text-dim);color:var(--darkest)}
.nl-btn[data-nl="1"].nl-on{background:var(--blue);border-color:var(--blue)}
.nl-btn[data-nl="2"].nl-on{background:var(--teal);border-color:var(--teal)}
.nl-btn[data-nl="3"].nl-on{background:var(--gold);border-color:var(--gold)}

/* TURN BANNER */
.turn{text-align:center;padding:14px 24px;margin-bottom:18px;font-family:var(--fl);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;position:relative;overflow:hidden}
.turn::before{content:'';position:absolute;inset:0;opacity:.15}
.turn.yours{background:linear-gradient(90deg,transparent,#17dec510,transparent);border:1px solid var(--teal);color:var(--teal);animation:turnPulse 2s ease-in-out infinite}
.turn.theirs{background:var(--panel);border:1px solid #ffffff0a;color:var(--text-dim)}
@keyframes turnPulse{0%,100%{box-shadow:0 0 0 0 var(--teal-dim)}50%{box-shadow:0 0 30px 4px var(--teal-dim)}}

/* BAN SEQUENCE */
.bseq{display:flex;align-items:center;justify-content:center;gap:2px;margin:14px 0 18px;flex-wrap:wrap}
.bs{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:2px solid;transition:all .4s var(--ease)}
.bs.done{opacity:.4}
.bs.done.ta{border-color:var(--teal);color:var(--teal);background:#17dec508}
.bs.done.tb{border-color:var(--red);color:var(--red);background:#ff465508}
.bs.now{animation:turnPulse 2s ease-in-out infinite}
.bs.now.ta{border-color:var(--teal);color:var(--teal)}
.bs.now.tb{border-color:var(--red);color:var(--red)}
.bs.later{border-color:#ffffff0a;color:var(--text-mute);opacity:.2}
.bs-map{border-color:var(--gold)!important;color:var(--gold)!important;opacity:1!important}
.bs-side{border-color:var(--purple)!important;color:var(--purple)!important;opacity:1!important}
.bc{width:14px;height:1.5px;background:#ffffff08}
.bc.done{background:var(--teal-dim)}

/* === MAP CARDS === */
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.mc{background:var(--panel);border:2px solid #ffffff08;border-radius:6px;overflow:hidden;cursor:pointer;transition:all .4s var(--ease);position:relative}
.mc:hover:not(.banned):not(.off){transform:translateY(-6px);border-color:#ffffff20;box-shadow:0 12px 40px #0006}
.mc.sel{border-color:var(--teal);box-shadow:0 0 24px var(--teal-dim)}
.mc.avoid{border-color:var(--red);box-shadow:0 0 24px var(--red-dim)}
.mc.banned{cursor:default;opacity:.55}
.mc.banned .mi img{filter:grayscale(1) brightness(.25)}
.mc.off{cursor:default;opacity:.4}
.mi{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--dark)}
.mi img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease),filter .3s;display:block}
.mc:hover:not(.banned):not(.off) .mi img{transform:scale(1.08)}
.mi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,#000c);pointer-events:none}
.mi .mn{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;z-index:1;font-family:var(--fd);font-size:14px;font-weight:900;letter-spacing:2px;text-transform:uppercase;text-shadow:0 2px 8px #000}
.mi .wr-bar{position:absolute;bottom:0;left:0;right:0;height:3px;z-index:2}
.mi .wr-fill{height:100%;transition:width .4s var(--ease)}
.mi .chk{position:absolute;top:8px;right:8px;width:26px;height:26px;background:var(--teal);color:#000;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:3;box-shadow:0 2px 8px #0004}
.mi .avd{position:absolute;top:8px;right:8px;width:26px;height:26px;background:var(--red);color:#fff;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:3}
.mi .badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:3px;z-index:3}
.mi .nbdg{padding:3px 8px;font-size:7px;font-weight:800;letter-spacing:.5px;border-radius:2px;text-transform:uppercase;color:#000;backdrop-filter:blur(4px)}
.ban-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000a;z-index:2}
.ban-x{font-size:40px;font-weight:900;color:var(--red);text-shadow:0 0 20px #ff465580}
.ban-who{font-family:var(--fl);font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;padding:3px 10px;border-radius:2px}
.ban-who.bta{color:var(--teal);background:#17dec510;border:1px solid var(--teal-dim)}
.ban-who.btb{color:var(--red);background:#ff465510;border:1px solid var(--red-dim)}

/* CARD STATS */
.ms{padding:6px 12px 4px;font-size:11px}
.ms .sr{display:flex;justify-content:space-between;padding:1px 0;color:var(--text-dim)}
.ms .sv{font-weight:700;color:var(--text)}
.ms .sv.hi{color:var(--green)}
.ms .sv.lo{color:var(--red)}
.ma{padding:2px 12px 6px}
.ma .ah{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-mute);margin-bottom:3px;padding-top:4px;border-top:1px solid #ffffff06}
.ma .ar{display:flex;align-items:center;gap:5px;font-size:10px;padding:1px 0}
.ma .an{width:38px;font-weight:700;color:var(--text);font-size:9px}
.ma .ab{flex:1;height:3px;background:#ffffff08;border-radius:2px;overflow:hidden}
.ma .af{height:100%;border-radius:2px}
.ma .aw{width:30px;text-align:right;font-weight:700;font-size:9px}
.ma .ak{width:36px;text-align:right;color:var(--text-dim);font-size:9px}
.m-inc{display:flex;gap:4px;padding:4px 12px 8px;flex-wrap:wrap}
.m-it{padding:3px 8px;font-size:9px;font-weight:700;letter-spacing:.5px;border-radius:2px;border:1px solid}

/* VOTE PROGRESS */
.vp{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:14px 0}
.vd{display:flex;align-items:center;gap:4px;padding:5px 12px;background:var(--panel);border:1px solid #ffffff08;font-size:10px;font-weight:600;border-radius:2px}
.vd.y{border-color:var(--green);color:var(--green)}
.vd.n{opacity:.35}

/* ROULETTE */
.rl-opts{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.rl-card{width:300px;background:var(--panel);border:2px solid #ffffff08;border-radius:8px;overflow:hidden;cursor:pointer;transition:all .4s var(--ease)}
.rl-card:hover{border-color:#ffffff20;transform:translateY(-6px);box-shadow:0 12px 40px #0006}
.rl-card.voted{border-color:var(--gold);box-shadow:0 0 30px var(--gold-dim)}

/* RESULT */
.res{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.res-tag{font-family:var(--fl);font-size:11px;font-weight:700;letter-spacing:8px;text-transform:uppercase;color:var(--gold);margin-bottom:20px;animation:fadeUp .5s var(--ease)}
.res-card{display:inline-block;width:440px;max-width:90vw;border:2px solid var(--gold);border-radius:8px;overflow:hidden;animation:revealCard .7s var(--ease);box-shadow:0 0 80px var(--gold-dim),0 20px 60px #0008}
.res-card img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
.res-card .rn{padding:18px;font-family:var(--fd);font-size:36px;font-weight:900;letter-spacing:5px;text-transform:uppercase;background:linear-gradient(transparent,#000)}
.res-hist{margin-top:24px;background:var(--panel);border:1px solid #ffffff08;padding:18px;text-align:left;max-width:500px;width:100%;border-radius:4px}
.res-hist h4{font-family:var(--fl);font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-mute);margin-bottom:12px}
.hi{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;border-bottom:1px solid #ffffff06}
.tb-w{display:flex;align-items:center;gap:8px;padding:4px 0}
.tb-n{width:80px;font-weight:600;font-size:12px}
.tb-b{flex:1;height:8px;background:#ffffff08;border-radius:4px;overflow:hidden}
.tb-f{height:100%;border-radius:4px;transition:width .6s var(--ease)}
.tb-c{width:30px;text-align:right;font-weight:700;font-size:12px}

/* TOAST */
#toast{position:fixed;top:24px;right:24px;padding:14px 24px;background:var(--panel);border:1px solid var(--red);color:var(--text);font-family:var(--fl);font-size:11px;font-weight:700;letter-spacing:1.5px;z-index:9999;transform:translateX(calc(100% + 40px));transition:transform .4s var(--ease);pointer-events:none;border-radius:4px;box-shadow:0 8px 32px #0008}
#toast.show{transform:translateX(0)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes revealCard{from{opacity:0;transform:scale(.85) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}

@media(max-width:640px){
  .teams-wrap{grid-template-columns:1fr}
  .home-forms{flex-direction:column;align-items:center}
  .rl-opts{flex-direction:column;align-items:center}
  .mg{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
var socket=io(),myId=null,room=null,selectedSystem='cs2Premier',localSet=new Set(),localRoulette=null,submitted=false;
var ALL=['Ascent','Haven','Bind','Lotus','Split','Pearl','Sunset','Breeze','Corrode','Abyss','Icebox','Fracture'];
var SYS={
  mapAvoid:{name:'Map Avoidance',icon:'\u2298',desc:'Each player marks maps they want to avoid. Avoided maps are removed from the pool. A random map is selected from whatever remains.'},
  ow2Vote:{name:'OW2 Voting',icon:'\u25CE',desc:'Three random maps are offered to the lobby. All players vote for their favorite. Votes become weighted roulette odds \u2014 higher votes = higher chance, but never guaranteed.'},
  curated:{name:'Curated Selection',icon:'\u2726',desc:'The system surfaces a smaller set of maps for the lobby. Each player selects which maps from that set they\'d play. The most-selected map wins.'},
  cs2Premier:{name:'CS2 Premier',icon:'\u2694',desc:'Team captains alternate banning maps from the pool until one remains. Then the non-last-banning team picks Attack or Defend. Strategic elimination with side selection.'}
};
var NLN=['Base','+ Stats','+ Nudges','+ Incentives'];
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function me(){return room&&room.players.find(function(p){return p.id===myId})}
function isHost(){return room&&room.host===myId}
function pN(id){var p=room&&room.players.find(function(p){return p.id===id});return p?p.name:'???'}
function pT(id){var p=room&&room.players.find(function(p){return p.id===id});return p?p.team:'a'}
function tL(t){return t==='a'?'Team A':'Team B'}
function tC(t){return t==='a'?'var(--teal)':'var(--red)'}
function ini(n){return n.slice(0,2).toUpperCase()}
function mySt(){var m=me();return m?m.stats:null}
function nl(){return(room&&room.config&&room.config.nudgeLevel)||0}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},3000)}
socket.on('joined',function(d){myId=d.playerId;if(window.history.replaceState)window.history.replaceState({},'',window.location.pathname);render()});
socket.on('room-update',function(d){var prev=room?room.phase:null;room=d;if(room.phase==='playing'&&prev!=='playing'){localSet=new Set();localRoulette=null;submitted=false}render()});
socket.on('error-msg',function(m){showToast(m)});
socket.on('disconnect',function(){room=null;myId=null;render();showToast('Disconnected')});

function render(){var a=document.getElementById('app');if(!room)a.innerHTML=renderHome();else if(room.phase==='lobby')a.innerHTML=renderLobby();else if(room.phase==='playing')a.innerHTML=renderGame();else if(room.phase==='result')a.innerHTML=renderResult()}

// ═══ HOME ═══

  return '<div class="home">'+
    '<div class="home-tag">VALORANT CUSTOM MATCHES</div>'+
    '<div class="home-title">MAP SELECTOR</div>'+
    '<div class="home-sub">Multiplayer map selection for internal playtests</div>'+
    '<div class="home-forms">'+
      '<div class="form-card"><h3>Create Room</h3><label>Your Name</label><input type="text" id="createName" placeholder="Enter name" maxlength="16" autocomplete="off"><button class="btn btn-red" data-action="create-room" style="width:100%">Create</button></div>'+
      '<div class="form-card"><h3>Join Room</h3><label>Room Code</label><input type="text" id="joinCode" class="code-input" placeholder="ABCD" maxlength="4" value="'+esc(pre)+'" autocomplete="off"><label>Your Name</label><input type="text" id="joinName" placeholder="Enter name" maxlength="16" autocomplete="off"><button class="btn btn-red" data-action="join-room" style="width:100%">Join</button></div>'+
    '</div></div>'
}

// ═══ LOBBY ═══
function renderLobby(){
  var tA=room.players.filter(function(p){return p.team==='a'}),tB=room.players.filter(function(p){return p.team==='b'}),h=isHost();
  function pr(p){
    var im=p.id===myId,b='';
    if(p.isCaptain)b+='<span class="bdg bdg-cap">CAP</span>';
    if(p.id===room.host)b+='<span class="bdg bdg-host">HOST</span>';
    if(im)b+='<span class="bdg bdg-you">YOU</span>';
    // Show main agent from their stats
    var agName='';if(p.stats){var firstMap=Object.keys(p.stats)[0];if(firstMap&&p.stats[firstMap].agents)agName=p.stats[firstMap].agents[0].name}
    var c='';
    if(h&&p.id!==myId){var ot=p.team==='a'?'b':'a';c='<div class="p-ctrls"><button class="btn btn-sm btn-ghost" data-action="set-team" data-player="'+p.id+'" data-team="'+ot+'">\u2192 '+tL(ot)+'</button>';if(!p.isCaptain)c+='<button class="btn btn-sm btn-ghost" data-action="set-captain" data-player="'+p.id+'">\u2605</button>';c+='</div>'}
    return '<div class="p-row"><div class="p-av">'+ini(p.name)+'</div><span class="p-name">'+esc(p.name)+(agName?' <span style="font-size:10px;color:var(--text-dim);font-weight:400">\u00B7 '+esc(agName)+' main</span>':'')+'</span><div class="p-badges">'+b+'</div>'+c+'</div>'
  }
  var sb=Object.keys(SYS).map(function(k){return '<div class="sys-card '+(selectedSystem===k?'active':'')+'" data-action="select-system" data-system="'+k+'"><div class="sys-icon">'+SYS[k].icon+'</div><div class="sys-name">'+SYS[k].name+'</div></div>'}).join('');
  var cfg='';
  if(h){
    if(selectedSystem==='cs2Premier'){var ps=(room.config&&room.config.poolSize)||7;cfg+='<div class="cfg-row"><span class="cfg-label">Map Pool:</span>'+[7,9,12].map(function(s){return '<button class="btn btn-sm '+(ps===s?'btn-red':'btn-ghost')+'" data-action="set-pool" data-size="'+s+'">'+s+' Maps</button>'}).join('')+'</div>'}
    if(selectedSystem==='mapAvoid'){var ma=(room.config&&room.config.maxAvoids)||2;cfg+='<div class="cfg-row"><span class="cfg-label">Avoids:</span>'+[1,2,3].map(function(n){return '<button class="btn btn-sm '+(ma===n?'btn-red':'btn-ghost')+'" data-action="set-avoids" data-n="'+n+'">'+n+'</button>'}).join('')+'</div>'}
    if(selectedSystem==='curated'){var cs=(room.config&&room.config.curatedSize)||5;cfg+='<div class="cfg-row"><span class="cfg-label">Pool:</span>'+[3,4,5,7].map(function(n){return '<button class="btn btn-sm '+(cs===n?'btn-red':'btn-ghost')+'" data-action="set-curated" data-n="'+n+'">'+n+'</button>'}).join('')+'</div>'}
    var cn=(room.config&&room.config.nudgeLevel)||0;
    cfg+='<div class="cfg-row"><span class="cfg-label">Info Layer:</span>'+NLN.map(function(name,i){return '<button class="btn btn-sm '+(cn===i?'btn-red':'btn-ghost')+'" data-action="set-nudge" data-n="'+i+'">'+name+'</button>'}).join('')+'</div>'
  }
  var hs='';
  if(h){hs='<div style="margin-bottom:28px"><div class="sys-label">Select System</div><div class="sys-row">'+sb+'</div><div class="sys-desc">'+SYS[selectedSystem].desc+'</div>'+cfg+'</div><div style="text-align:center"><button class="btn btn-lg btn-red" data-action="start-game">START '+SYS[selectedSystem].name.toUpperCase()+'</button></div>'}
  else{hs='<div style="text-align:center;margin-top:28px"><div class="sys-label">Waiting for Host</div><div style="font-size:13px;color:var(--text-dim);animation:turnPulse 2s ease-in-out infinite;margin-top:8px">The host will choose a system and start the game.</div></div>'}
  return '<div class="lobby"><div class="room-header"><div class="room-code-label">Room Code</div><div class="room-code">'+room.code+'</div><div style="margin-top:10px;display:flex;gap:8px;justify-content:center"><button class="btn btn-sm btn-ghost" data-action="copy-code">Copy Code</button><button class="btn btn-sm btn-ghost" data-action="copy-link">Copy Link</button></div></div>'+
    '<div class="teams-wrap"><div class="team-col team-a"><div class="team-hdr">Team A \u00B7 Attackers ('+tA.length+')</div><div class="team-body">'+(tA.length?tA.map(pr).join(''):'<div style="color:var(--text-mute);font-size:12px;padding:8px 0">No players</div>')+'</div></div>'+
    '<div class="team-col team-b"><div class="team-hdr">Team B \u00B7 Defenders ('+tB.length+')</div><div class="team-body">'+(tB.length?tB.map(pr).join(''):'<div style="color:var(--text-mute);font-size:12px;padding:8px 0">No players</div>')+'</div></div></div>'+hs+'</div>'
}

// ═══ GAME DISPATCH ═══
function renderGame(){switch(room.system){case 'mapAvoid':return renderMapAvoid();case 'ow2Vote':return renderOw2Vote();case 'curated':return renderCurated();case 'cs2Premier':return renderCs2Premier();default:return ''}}

// ═══ HELPERS ═══
function nudgeBar(){var c=nl(),h=isHost();return '<div class="nl-bar"><span class="nl-label">Info Layer</span>'+NLN.map(function(n,i){return '<button class="nl-btn'+(c===i?' nl-on':'')+'" data-action="set-nudge" data-n="'+i+'" data-nl="'+i+'"'+(h?'':' disabled')+'>'+n+'</button>'}).join('')+'</div>'}
function voteProg(k){var v=(room.state&&room.state[k])||[];return '<div class="vp">'+room.players.map(function(p){var d=v.indexOf(p.id)>=0;return '<div class="vd '+(d?'y':'n')+'">'+(d?'\u2713':'\u00B7')+' '+esc(p.name)+(p.id===myId?' (you)':'')+'</div>'}).join('')+'</div>'}
function getNB(st){if(!st)return '';var b=[];if(st.streak>=5)b.push({t:'On Fire: '+st.streak+'W',c:'var(--orange)'});else if(st.reworked)b.push({t:'Reworked',c:'var(--teal)'});else if(st.isNew)b.push({t:'New Map',c:'var(--teal)'});else if(st.wr>=55&&st.games>=80)b.push({t:'High Win Rate',c:'var(--green)'});else if(st.wr>=55)b.push({t:'Strong Here',c:'var(--teal)'});else if(st.recent>=12)b.push({t:'Trending Up',c:'var(--green)'});else if(st.enemyWr>=53)b.push({t:'Enemy Comfort',c:'var(--red)'});else if(st.games<40)b.push({t:'Low Play Count',c:'var(--blue)'});if(!b.length)return '';return '<div class="badges">'+b.map(function(x){return '<span class="nbdg" style="background:'+x.c+'">'+x.t+'</span>'}).join('')+'</div>'}
function getIT(st){if(!st)return '';var w=Math.min(st.wr,st.teamWr||st.wr);if(w>=52&&st.games>=80&&!st.reworked&&!st.isNew)return '';var rv,rc,sv,sc;if(st.games<20||w<=35){rv=8;rc='var(--gold)'}else if(w<=40){rv=6;rc='var(--gold)'}else if(w<=45){rv=5;rc='var(--purple)'}else if(w<=50){rv=4;rc='var(--purple)'}else{rv=3;rc='var(--blue)'}if(st.games<20||w<=37){sv=5;sc='var(--green)'}else if(w<=42){sv=4;sc='var(--teal)'}else if(w<=47){sv=3;sc='var(--teal)'}else{sv=2;sc='var(--teal)'}return '<div class="m-inc"><span class="m-it" style="color:'+rc+';border-color:'+rc+'">+'+rv+' RR</span><span class="m-it" style="color:'+sc+';border-color:'+sc+'">'+sv+' RR Shield</span></div>'}
function radar(ms,sz){if(!ms)return '';var ax=[{l:'WR',v:ms.wr/100},{l:'EXP',v:Math.min(ms.games/150,1)},{l:'TEAM',v:ms.teamWr/100},{l:'AGENT',v:(ms.agents&&ms.agents[0]?ms.agents[0].wr:50)/100},{l:'FORM',v:Math.min(ms.recent/15,1)}];var cx=sz/2,cy=sz/2,r=sz/2-14,n=5;var g='',al='',d='',lb='';[.25,.5,.75,1].forEach(function(s){var p=[];for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;p.push((cx+r*s*Math.cos(a)).toFixed(1)+','+(cy+r*s*Math.sin(a)).toFixed(1))}g+='<polygon points="'+p.join(' ')+'" fill="none" stroke="#ffffff06" stroke-width=".5"/>'});for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;al+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="#ffffff06" stroke-width=".5"/>'}var pts=[];for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;var v=Math.max(ax[i].v,.08);pts.push((cx+r*v*Math.cos(a)).toFixed(1)+','+(cy+r*v*Math.sin(a)).toFixed(1));d+='<circle cx="'+(cx+r*v*Math.cos(a)).toFixed(1)+'" cy="'+(cy+r*v*Math.sin(a)).toFixed(1)+'" r="2" fill="var(--teal)"/>'}for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;var lx=cx+(r+10)*Math.cos(a),ly=cy+(r+10)*Math.sin(a);lb+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" fill="#5a5549" font-size="6" font-weight="700" font-family="Urbanist,sans-serif" letter-spacing=".5">'+ax[i].l+'</text>'}return '<svg viewBox="0 0 '+sz+' '+sz+'" width="'+sz+'" height="'+sz+'" style="display:block;margin:4px auto">'+g+al+'<polygon points="'+pts.join(' ')+'" fill="#17dec515" stroke="var(--teal)" stroke-width="1.5" stroke-linejoin="round"/>'+d+lb+'</svg>'}

// ═══ MAP CARD ═══
function mc(name,o){
  o=o||{};var cl='mc';if(o.sel)cl+=' sel';if(o.avoid)cl+=' avoid';if(o.banned)cl+=' banned';if(o.off)cl+=' off';
  var st=mySt(),ms=st?st[name]:null,lv=nl();
  var ov='';if(o.banned){var bw='';if(o.bBy){var tc=o.bT==='a'?'bta':'btb';bw='<div class="ban-who '+tc+'">'+esc(o.bBy)+'</div>'}ov='<div class="ban-ov"><div class="ban-x">\u2715</div>'+bw+'</div>'}
  var badge='';if(o.sel)badge='<div class="chk">\u2713</div>';if(o.avoid)badge='<div class="avd">\u2715</div>';
  var nb=(lv>=2&&ms&&!o.banned)?getNB(ms):'';
  // WR bar
  var wrBar='';if(ms&&!o.banned){var wc=ms.wr>=55?'var(--green)':ms.wr>=45?'var(--gold)':'var(--red)';wrBar='<div class="wr-bar"><div class="wr-fill" style="width:'+ms.wr+'%;background:'+wc+'"></div></div>'}
  var act=o.action?' data-action="'+o.action+'" data-map="'+esc(name)+'"':'';
  // Stats
  var sh='';
  if(lv>=1&&ms&&!o.banned){var wC=ms.wr>=55?'hi':ms.wr<45?'lo':'';var tC=ms.teamWr>=55?'hi':ms.teamWr<45?'lo':'';
    sh='<div class="ms"><div class="sr"><span>Your WR</span><span class="sv '+wC+'">'+ms.wr+'%</span></div><div class="sr"><span>Games</span><span class="sv">'+ms.games+'</span></div><div class="sr"><span>Ally WR</span><span class="sv '+tC+'">'+ms.teamWr+'%</span></div><div class="sr"><span>Enemy WR</span><span class="sv '+(ms.enemyWr>=53?'lo':'')+'">'+ms.enemyWr+'%</span></div></div>';
    if(ms.agents&&ms.agents.length){var mx=ms.agents[0].wr;sh+='<div class="ma"><div class="ah">Your Agents</div>'+ms.agents.map(function(a){var c=a.wr>=55?'var(--green)':a.wr>=45?'var(--text)':'var(--red)';return '<div class="ar"><span class="an">'+esc(a.name)+'</span><div class="ab"><div class="af" style="width:'+Math.round(a.wr/mx*100)+'%;background:'+c+'"></div></div><span class="aw" style="color:'+c+'">'+a.wr+'%</span><span class="ak">'+a.kd+'</span></div>'}).join('')+'</div>'}}
  var rd=(lv>=1&&ms&&!o.banned&&o.showRadar)?'<div style="padding:2px 12px 6px">'+radar(ms,90)+'</div>':'';
  var inc=(lv>=3&&ms&&!o.banned)?getIT(ms):'';
  return '<div class="'+cl+'"'+act+'><div class="mi"><img src="/maps/'+encodeURIComponent(name)+'.png" alt="'+esc(name)+'" loading="lazy">'+badge+ov+nb+'<div class="mn">'+esc(name)+'</div>'+wrBar+'</div>'+sh+rd+inc+'</div>'
}

// ═══ MAP AVOIDANCE ═══
function renderMapAvoid(){var s=room.state,mx=s.maxAvoids||2,hv=(s.voters||[]).indexOf(myId)>=0||submitted;
  var g;if(hv){g='<div class="mg" style="opacity:.5">'+ALL.map(function(m){return mc(m,{avoid:localSet.has(m),off:true})}).join('')+'</div>'}else{g='<div class="mg">'+ALL.map(function(m){return mc(m,{avoid:localSet.has(m),action:'toggle-avoid'})}).join('')+'</div>'}
  var sa='';if(!hv){sa='<div style="text-align:center;margin-bottom:18px"><span style="font-size:12px;color:var(--text-dim)">Avoiding: <strong style="color:var(--red)">'+localSet.size+'/'+mx+'</strong></span> <button class="btn btn-red" data-action="submit-avoids" style="margin-left:12px">SUBMIT</button><div style="font-size:10px;color:var(--text-mute);margin-top:6px">Mark up to '+mx+' maps. Submitting 0 is fine.</div></div>'}else{sa='<div style="text-align:center;margin-bottom:18px;font-size:13px;color:var(--green)">Avoids submitted! Waiting for others...</div>'}
  return '<div class="game"><div class="g-hdr"><div class="g-title">Map Avoidance</div><div class="g-sub">Mark maps to avoid \u2014 random from remaining</div></div>'+nudgeBar()+voteProg('voters')+sa+g+'</div>'
}
// ═══ OW2 VOTING ═══
function renderOw2Vote(){var s=room.state,opts=s.options||[],vs=s.voters||[],hv=vs.indexOf(myId)>=0,st=mySt(),lv=nl();
  var oh=opts.map(function(m){var vt=localRoulette===m,ms=st?st[m]:null;var nb=(lv>=2&&ms)?getNB(ms):'';
    var sh='';if(lv>=1&&ms){var wC=ms.wr>=55?'hi':ms.wr<45?'lo':'';sh='<div class="ms"><div class="sr"><span>Your WR</span><span class="sv '+wC+'">'+ms.wr+'%</span></div><div class="sr"><span>Games</span><span class="sv">'+ms.games+'</span></div><div class="sr"><span>Ally WR</span><span class="sv">'+ms.teamWr+'%</span></div><div class="sr"><span>Enemy WR</span><span class="sv">'+ms.enemyWr+'%</span></div></div>';if(ms.agents){var mx=ms.agents[0].wr;sh+='<div class="ma"><div class="ah">Your Agents</div>'+ms.agents.map(function(a){var c=a.wr>=55?'var(--green)':a.wr>=45?'var(--text)':'var(--red)';return '<div class="ar"><span class="an">'+esc(a.name)+'</span><div class="ab"><div class="af" style="width:'+Math.round(a.wr/mx*100)+'%;background:'+c+'"></div></div><span class="aw" style="color:'+c+'">'+a.wr+'%</span><span class="ak">'+a.kd+'</span></div>'}).join('')+'</div>'}}
    var inc=(lv>=3&&ms)?getIT(ms):'';
    return '<div class="rl-card '+(vt?'voted':'')+'" data-action="vote-roulette" data-map="'+esc(m)+'"><div class="mi"><img src="/maps/'+encodeURIComponent(m)+'.png" alt="'+esc(m)+'">'+nb+'<div class="mn" style="font-size:18px">'+esc(m)+'</div></div>'+sh+inc+'</div>'}).join('');
  var sm=hv?'<div style="font-size:13px;color:var(--green)">Vote locked! Waiting...</div>':'<div style="font-size:13px;color:var(--text-dim)">Click a map to vote</div>';
  return '<div class="game"><div class="g-hdr"><div class="g-title">OW2 Voting</div><div class="g-sub">Vote \u2014 votes become weighted roulette odds</div></div>'+nudgeBar()+voteProg('voters')+'<div class="rl-opts">'+oh+'</div><div style="text-align:center;margin-top:16px">'+sm+'</div></div>'
}
// ═══ CURATED ═══
function renderCurated(){var s=room.state,pool=s.pool||[],hv=(s.voters||[]).indexOf(myId)>=0||submitted;
  var g;if(hv){g='<div class="mg">'+pool.map(function(m){return mc(m,{sel:localSet.has(m),off:true})}).join('')+'</div>'}else{g='<div class="mg">'+pool.map(function(m){return mc(m,{sel:localSet.has(m),action:'toggle-sel'})}).join('')+'</div>'}
  var sa='';if(!hv){sa='<div style="text-align:center;margin-bottom:18px"><span style="font-size:12px;color:var(--text-dim)">Selected: <strong style="color:var(--teal)">'+localSet.size+'</strong></span> <button class="btn btn-teal" data-action="submit-vote" style="margin-left:12px"'+(localSet.size===0?' disabled':'')+'>LOCK IN</button><div style="font-size:10px;color:var(--text-mute);margin-top:6px">'+pool.length+' maps curated for this lobby.</div></div>'}else{sa='<div style="text-align:center;margin-bottom:18px;font-size:13px;color:var(--green)">Locked! Waiting...</div>'}
  return '<div class="game"><div class="g-hdr"><div class="g-title">Curated Selection</div><div class="g-sub">Select from a personalized set</div></div><div style="text-align:center;margin-bottom:10px"><span style="font-family:var(--fl);font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--teal);padding:7px 16px;background:#17dec508;border:1px solid var(--teal-dim);display:inline-block;border-radius:2px">Curated for This Lobby</span></div>'+nudgeBar()+voteProg('voters')+sa+g+'</div>'
}

// ═══ CS2 PREMIER ═══
function renderCs2Premier(){
  var s=room.state,pool=s.pool||[],banned=s.banned||[],banOrder=s.banOrder||[],bi=s.banIndex||0,pp=s.premierPhase||'ban',st=mySt(),lv=nl();
  // --- SIDE PICK ---
  if(pp==='sidePick'&&s.result){
    var isSP=myId===s.sidePickCaptain,spT=s.sidePickTeam==='a'?'TEAM A':'TEAM B',ms=st?st[s.result]:null;
    var rdh=ms?'<div style="margin-top:20px">'+radar(ms,160)+'<div style="font-size:8px;color:var(--text-mute);letter-spacing:2px;text-transform:uppercase;margin-top:4px">Your Stats</div></div>':'';
    var sb=isSP?'<div style="display:flex;gap:16px;justify-content:center;margin-top:28px"><button class="btn btn-lg" data-action="pick-side" data-side="attack" style="background:var(--red);border-color:var(--red);color:#fff;min-width:180px;flex-direction:column;gap:6px;padding:20px 36px"><span style="font-size:16px;letter-spacing:4px">ATTACK</span><span style="font-size:8px;letter-spacing:1px;opacity:.7">Start on Attack Side</span></button><button class="btn btn-lg" data-action="pick-side" data-side="defend" style="background:var(--teal);border-color:var(--teal);color:#000;min-width:180px;flex-direction:column;gap:6px;padding:20px 36px"><span style="font-size:16px;letter-spacing:4px">DEFEND</span><span style="font-size:8px;letter-spacing:1px;opacity:.4">Start on Defend Side</span></button></div>':'<div style="text-align:center;margin-top:28px;font-size:14px;color:var(--text-dim);animation:turnPulse 2s ease-in-out infinite">Waiting for '+spT+' captain to pick side...</div>';
    var bh=banned.map(function(b){var tc=tC(pT(b.by));return '<span style="padding:4px 12px;font-size:10px;font-weight:700;text-decoration:line-through;color:'+tc+';border:1px solid '+tc+';opacity:.4;border-radius:2px">'+esc(b.map)+'</span>'}).join('');
    return '<div class="game"><div class="g-hdr"><div class="g-title">Side Select</div><div class="g-sub">'+spT+' picks starting side</div></div><div style="text-align:center;padding:16px 0"><div style="display:inline-block;width:400px;max-width:90vw;border:2px solid var(--gold);border-radius:8px;overflow:hidden;box-shadow:0 0 60px var(--gold-dim),0 20px 60px #0008;animation:revealCard .6s var(--ease)"><img src="/maps/'+encodeURIComponent(s.result)+'.png" style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover"><div style="padding:16px;background:linear-gradient(var(--panel),var(--dark))"><div style="font-family:var(--fd);font-size:28px;font-weight:900;letter-spacing:4px;text-transform:uppercase">'+esc(s.result)+'</div><div style="font-size:9px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-top:4px">Final Map</div></div></div>'+rdh+'</div>'+sb+'<div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:24px">'+bh+'</div></div>'
  }
  // --- BAN PHASE ---
  var cb=banOrder[bi],myTurn=cb===myId,total=banOrder.length;
  // Sequence
  var allP=[];for(var i=0;i<total;i++)allP.push({team:pT(banOrder[i]),type:'ban',i:i});allP.push({type:'map'});allP.push({type:'side'});
  var seq=allP.map(function(p,idx){var cl,ic;if(p.type==='ban'){if(p.i<bi){cl='bs done t'+p.team;ic='\u2713'}else if(p.i===bi){cl='bs now t'+p.team;ic=''+(p.i+1)}else{cl='bs later';ic=''+(p.i+1)}}else if(p.type==='map'){cl='bs later bs-map';ic='\u2691'}else{cl='bs later bs-side';ic='\u2694'}var cn=idx<allP.length-1?'<div class="bc'+(p.type==='ban'&&p.i<bi?' done':'')+'"></div>':'';return '<div class="'+cl+'">'+ic+'</div>'+cn}).join('');
  var th=myTurn?'<div class="turn yours">Your Turn \u2014 Ban a Map</div>':'<div class="turn theirs">Waiting for '+esc(pN(cb)).toUpperCase()+' to ban</div>';
  var grid=pool.map(function(m){var ban=banned.find(function(b){return b.map===m});if(ban)return mc(m,{banned:true,bBy:pN(ban.by),bT:pT(ban.by)});return mc(m,{action:myTurn?'ban-map':null,off:!myTurn,showRadar:true})}).join('');
  var rem=pool.length-banned.length;
  return '<div class="game"><div class="g-hdr"><div class="g-title">CS2 Premier</div><div class="g-sub">Ban '+(bi+1)+' of '+total+' \u00B7 '+rem+' maps remaining</div></div>'+nudgeBar()+'<div class="bseq">'+seq+'</div>'+th+'<div class="mg">'+grid+'</div></div>'
}

// ═══ RESULT ═══
function renderResult(){
  var s=room.state,r=s.result,h=isHost(),sn=SYS[room.system]?SYS[room.system].name:'',d='';
  if(room.system==='mapAvoid'&&s.avoidCounts){var ae=Object.entries(s.avoidCounts).sort(function(a,b){return b[1]-a[1]});d='<div class="res-hist"><h4>Avoidance Summary</h4>'+ae.map(function(e){return '<div class="hi"><span style="color:var(--red);font-weight:700">\u2715</span> <strong>'+esc(e[0])+'</strong> <span style="color:var(--text-dim);margin-left:auto">'+e[1]+' avoided</span></div>'}).join('')+'<div style="font-size:11px;color:var(--green);margin-top:10px">'+(s.remaining||[]).length+' maps remained.</div></div>'}
  if(room.system==='ow2Vote'&&s.weights){var tt=Object.values(s.weights).reduce(function(a,b){return a+b},0);d='<div class="res-hist"><h4>Roulette Odds</h4>'+(s.options||[]).map(function(m){var w=s.weights[m]||0;var pc=Math.round(w/tt*100);var iw=m===r;var c=iw?'var(--gold)':'var(--teal)';return '<div class="tb-w"><span class="tb-n" style="'+(iw?'color:var(--gold)':'')+'">'+esc(m)+'</span><div class="tb-b"><div class="tb-f" style="width:'+pc+'%;background:'+c+'"></div></div><span class="tb-c" style="'+(iw?'color:var(--gold)':'')+'">'+pc+'%</span></div>'}).join('')+'</div>'}
  if(room.system==='curated'&&s.tally){var so=Object.entries(s.tally).sort(function(a,b){return b[1]-a[1]});var mx=so[0]?so[0][1]:1;d='<div class="res-hist"><h4>Vote Tally</h4>'+so.map(function(e){var m=e[0],ct=e[1];var pc=Math.round(ct/mx*100);var iw=m===r;var c=iw?'var(--gold)':'var(--teal)';return '<div class="tb-w"><span class="tb-n" style="'+(iw?'color:var(--gold)':'')+'">'+esc(m)+'</span><div class="tb-b"><div class="tb-f" style="width:'+pc+'%;background:'+c+'"></div></div><span class="tb-c" style="'+(iw?'color:var(--gold)':'')+'">'+ct+'</span></div>'}).join('')+'</div>'}
  if(room.system==='cs2Premier'){
    var sh='';if(s.side){var sl=s.side==='attack'?'ATTACKING':'DEFENDING';var sc=s.side==='attack'?'var(--red)':'var(--teal)';var stl=s.sidePickTeam==='a'?'Team A':'Team B';sh='<div style="margin-top:16px;padding:14px 20px;background:var(--panel);border:1px solid '+sc+';display:flex;align-items:center;justify-content:center;gap:14px;border-radius:4px"><span style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim)">Starting Side</span><span style="font-size:20px;font-weight:900;letter-spacing:4px;color:'+sc+'">'+sl+'</span><span style="font-size:9px;color:var(--text-mute)">picked by '+stl+'</span></div>'}
    if(s.banned){d=sh+'<div class="res-hist"><h4>Ban History</h4>'+s.banned.map(function(b,i){var tm=pT(b.by);return '<div class="hi"><span style="width:24px;color:var(--text-mute);font-size:10px">'+(i+1)+'</span><span style="color:'+tC(tm)+';font-weight:700;font-size:11px;min-width:55px">'+tL(tm)+'</span><span>banned <strong>'+esc(b.map)+'</strong></span></div>'}).join('')+'</div>'}}
  var bb=h?'<div style="margin-top:28px"><button class="btn btn-lg btn-ghost" data-action="back-to-lobby">Return to Lobby</button></div>':'<div style="margin-top:28px;font-size:12px;color:var(--text-mute)">Waiting for host...</div>';
  return '<div class="res"><div class="res-tag">Map Selected \u00B7 '+sn.toUpperCase()+'</div><div class="res-card"><img src="/maps/'+encodeURIComponent(r)+'.png" alt="'+esc(r)+'"><div class="rn">'+esc(r)+'</div></div>'+d+bb+'</div>'
}

// ═══ EVENTS ═══
document.getElementById('app').addEventListener('click',function(e){var el=e.target.closest('[data-action]');if(!el)return;var a=el.dataset.action;
  switch(a){
    case 'create-room':{var n=(document.getElementById('createName')||{}).value;n=n?n.trim():'';if(!n)return showToast('Enter your name');socket.emit('create-room',{name:n});break}
    case 'join-room':{var c=(document.getElementById('joinCode')||{}).value,j=(document.getElementById('joinName')||{}).value;c=c?c.trim():'';j=j?j.trim():'';if(!c||c.length<4)return showToast('Enter a 4-char code');if(!j)return showToast('Enter your name');socket.emit('join-room',{code:c,name:j});break}
    case 'copy-code':if(navigator.clipboard&&room)navigator.clipboard.writeText(room.code);showToast('Copied!');break;
    case 'copy-link':if(navigator.clipboard&&room)navigator.clipboard.writeText(window.location.origin+'?room='+room.code);showToast('Link copied!');break;
    case 'set-team':socket.emit('set-team',{playerId:el.dataset.player,team:el.dataset.team});break;
    case 'set-captain':socket.emit('set-captain',{playerId:el.dataset.player});break;
    case 'select-system':selectedSystem=el.dataset.system;render();break;
    case 'set-pool':socket.emit('update-config',{poolSize:parseInt(el.dataset.size)});break;
    case 'set-avoids':socket.emit('update-config',{maxAvoids:parseInt(el.dataset.n)});break;
    case 'set-curated':socket.emit('update-config',{curatedSize:parseInt(el.dataset.n)});break;
    case 'set-nudge':socket.emit('update-config',{nudgeLevel:parseInt(el.dataset.n)});break;
    case 'start-game':socket.emit('start-system',{system:selectedSystem});break;
    case 'toggle-sel':{var m=el.dataset.map;if(localSet.has(m))localSet.delete(m);else localSet.add(m);render();break}
    case 'toggle-avoid':{var ma=el.dataset.map;var mx=(room.state&&room.state.maxAvoids)||2;if(localSet.has(ma))localSet.delete(ma);else if(localSet.size<mx)localSet.add(ma);render();break}
    case 'submit-vote':if(localSet.size===0)return;socket.emit('action',{action:'vote',maps:Array.from(localSet)});submitted=true;render();break;
    case 'submit-avoids':socket.emit('action',{action:'avoid',maps:Array.from(localSet)});submitted=true;render();break;
    case 'ban-map':socket.emit('action',{action:'ban',map:el.dataset.map});break;
    case 'pick-side':socket.emit('action',{action:'pick-side',side:el.dataset.side});break;
    case 'vote-roulette':{var rm=el.dataset.map;localRoulette=rm;socket.emit('action',{action:'vote',map:rm});render();break}
    case 'back-to-lobby':socket.emit('reset');break}
});
document.addEventListener('keydown',function(e){if(e.key!=='Enter')return;if(e.target.id==='createName'){var b=document.querySelector('[data-action="create-room"]');if(b)b.click()}if(e.target.id==='joinName'||e.target.id==='joinCode'){var b2=document.querySelector('[data-action="join-room"]');if(b2)b2.click()}});
render();
</script>
</body>
</html>
