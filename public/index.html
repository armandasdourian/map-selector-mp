<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAP SELECTOR // MULTIPLAYER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Lexend+Deca:wght@700;800;900&family=Urbanist:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red:#ff4655; --red-dim:#ff465540; --red-glow:#ff465530;
  --teal:#17dec5; --teal-dim:#17dec540; --teal-glow:#17dec530;
  --dark:#0f1923; --darker:#0a1118;
  --panel:#1a2332; --panel-hover:#253345;
  --text:#ece8e1; --text-dim:#8b8577;
  --gold:#f5c542; --gold-dim:#f5c54240;
  --green:#4ade80; --purple:#a78bfa; --blue:#58b4f0; --orange:#fb923c;
  --font-display:'Lexend Deca',sans-serif;
  --font-label:'Urbanist',sans-serif;
  --font-body:'Figtree',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scrollbar-width:thin;scrollbar-color:var(--red) var(--darker);}
body{font-family:var(--font-body);background:var(--darker);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px;}
::selection{background:var(--red);color:#fff;}
.home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.home-tag{font-family:var(--font-label);font-size:12px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:var(--red);margin-bottom:8px;}
.home-title{font-family:var(--font-display);font-size:clamp(36px,6vw,64px);font-weight:900;letter-spacing:-1px;text-transform:uppercase;background:linear-gradient(135deg,var(--text) 30%,var(--red) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.home-sub{font-size:14px;color:var(--text-dim);margin-top:10px;}
.home-forms{display:flex;gap:20px;margin-top:48px;flex-wrap:wrap;justify-content:center;}
.form-card{background:var(--panel);border:1px solid #ffffff10;padding:32px;width:280px;transition:border-color .3s;}
.form-card:hover{border-color:#ffffff20;}
.form-card h3{font-family:var(--font-display);font-size:15px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.form-card label{font-family:var(--font-label);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:6px;}
.form-card input{width:100%;padding:10px 14px;background:var(--darker);border:1px solid #ffffff15;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;margin-bottom:16px;transition:border-color .3s;}
.form-card input:focus{border-color:var(--red);}
.code-input{font-family:var(--font-display)!important;font-size:24px!important;font-weight:900!important;letter-spacing:8px!important;text-transform:uppercase;text-align:center;}
.btn{padding:10px 24px;font-family:var(--font-label);font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;border:1px solid;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;justify-content:center;gap:8px;background:none;color:var(--text);}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff;}
.btn-primary:hover{box-shadow:0 0 24px var(--red-glow);transform:translateY(-1px);}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#000;}
.btn-teal:hover{box-shadow:0 0 24px var(--teal-glow);}
.btn-outline{background:transparent;border-color:#ffffff20;color:var(--text-dim);}
.btn-outline:hover{border-color:var(--red);color:var(--text);}
.btn-sm{padding:6px 14px;font-size:9px;letter-spacing:2px;}
.btn-lg{padding:14px 36px;font-size:13px;letter-spacing:3px;}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.lobby{max-width:900px;margin:0 auto;padding:40px 20px;}
.room-header{text-align:center;margin-bottom:32px;}
.room-code-label{font-family:var(--font-label);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.room-code{font-family:var(--font-display);font-size:48px;font-weight:900;letter-spacing:12px;color:var(--text);}
.teams-container{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;}
.team-column{background:var(--panel);border:1px solid #ffffff10;padding:20px;}
.team-header{font-family:var(--font-label);font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid;}
.team-a .team-header{color:var(--teal);border-color:var(--teal-dim);}
.team-b .team-header{color:var(--red);border-color:var(--red-dim);}
.player-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #ffffff08;}
.player-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:11px;font-weight:900;color:#000;flex-shrink:0;}
.team-a .player-avatar{background:var(--teal);}
.team-b .player-avatar{background:var(--red);}
.player-name{flex:1;font-size:14px;font-weight:600;}
.player-badges{display:flex;gap:4px;flex-shrink:0;}
.badge{padding:2px 8px;font-family:var(--font-label);font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:2px;}
.badge-cap{background:var(--gold);color:#000;}
.badge-host{background:var(--purple);color:#000;}
.badge-you{background:#ffffff20;color:var(--text);}
.player-controls{display:flex;gap:4px;flex-shrink:0;}
.system-label{font-family:var(--font-label);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;text-align:center;}
.system-cards{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
.system-card{background:var(--panel);border:2px solid #ffffff10;padding:14px 18px;cursor:pointer;transition:all .3s;text-align:center;min-width:130px;}
.system-card:hover{border-color:var(--red-dim);transform:translateY(-2px);}
.system-card.active{border-color:var(--red);background:linear-gradient(135deg,#ff465515,#ff465505);box-shadow:0 0 20px var(--red-glow);}
.sys-icon{font-size:22px;margin-bottom:4px;}
.sys-name{font-family:var(--font-display);font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.system-detail{text-align:center;margin:12px 0 20px;padding:14px 20px;background:var(--panel);border-left:3px solid var(--red);font-size:13px;color:var(--text-dim);line-height:1.7;}
.config-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;flex-wrap:wrap;}
.config-label{font-family:var(--font-label);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
.game-screen{max-width:1200px;margin:0 auto;padding:30px 20px;}
.game-header{text-align:center;margin-bottom:20px;}
.game-system-name{font-family:var(--font-display);font-size:24px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.game-status{font-family:var(--font-label);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-top:6px;}
.turn-banner{text-align:center;padding:12px 20px;margin-bottom:20px;font-family:var(--font-label);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.turn-banner.your-turn{background:linear-gradient(135deg,var(--teal-dim),#17dec510);border:1px solid var(--teal);color:var(--teal);animation:pulse 2s ease-in-out infinite;}
.turn-banner.waiting{background:var(--panel);border:1px solid #ffffff10;color:var(--text-dim);}

/* NUDGE LAYER TOGGLE */
.nudge-bar{display:flex;gap:5px;justify-content:center;margin:12px 0 16px;flex-wrap:wrap;}
.nudge-btn{padding:6px 14px;font-family:var(--font-label);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid #ffffff15;background:var(--panel);color:var(--text-dim);cursor:pointer;transition:all .3s;}
.nudge-btn:hover{border-color:#ffffff30;}
.nudge-btn.nl-active{color:#fff;}
.nudge-btn[data-nl="0"].nl-active{background:var(--panel);border-color:var(--text-dim);color:var(--text);}
.nudge-btn[data-nl="1"].nl-active{background:var(--blue);border-color:var(--blue);color:#000;}
.nudge-btn[data-nl="2"].nl-active{background:var(--teal);border-color:var(--teal);color:#000;}
.nudge-btn[data-nl="3"].nl-active{background:var(--gold);border-color:var(--gold);color:#000;}

/* MAP CARDS */
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.map-card{background:var(--panel);border:2px solid #ffffff10;border-radius:4px;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1);position:relative;}
.map-card:hover:not(.banned):not(.disabled){transform:translateY(-4px);border-color:#ffffff30;box-shadow:0 8px 24px rgba(0,0,0,.3);}
.map-card.selected{border-color:var(--teal);box-shadow:0 0 20px var(--teal-dim);}
.map-card.avoided{border-color:var(--red);box-shadow:0 0 20px var(--red-dim);}
.map-card.banned{cursor:default;}
.map-card.banned .mc-img img{filter:grayscale(1) brightness(.3);}
.map-card.banned .map-label{text-decoration:line-through;opacity:.4;}
.map-card.disabled{cursor:default;opacity:.5;}
.mc-img{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--dark);}
.mc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s,filter .3s;display:block;}
.map-card:hover:not(.banned):not(.disabled) .mc-img img{transform:scale(1.05);}
.map-label{padding:6px 10px;font-family:var(--font-display);font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;}
.mc-check{position:absolute;top:8px;right:8px;width:24px;height:24px;background:var(--teal);color:#000;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:2;}
.mc-avoid{position:absolute;top:8px;right:8px;width:24px;height:24px;background:var(--red);color:#fff;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:2;}
.mc-badges{position:absolute;top:6px;left:6px;display:flex;flex-direction:column;gap:3px;z-index:2;}
.mc-badge{padding:2px 7px;font-size:7px;font-weight:800;letter-spacing:1px;border-radius:2px;text-transform:uppercase;color:#000;}
.ban-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.5);z-index:1;}
.ban-x{font-size:36px;font-weight:900;color:var(--red);text-shadow:0 2px 12px rgba(255,70,85,.5);}
.ban-by{font-family:var(--font-label);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:4px;padding:2px 8px;background:#000a;}
.ban-by.team-a-tag{color:var(--teal);border:1px solid var(--teal-dim);}
.ban-by.team-b-tag{color:var(--red);border:1px solid var(--red-dim);}

/* STATS PANEL ON CARD */
.mc-stats{padding:0 10px 6px;font-size:11px;color:var(--text-dim);}
.mc-stats .sr{display:flex;justify-content:space-between;margin:1px 0;}
.mc-stats .sv{font-weight:700;color:var(--text);}
.mc-stats .sv.high{color:var(--green);}
.mc-stats .sv.low{color:var(--red);}
.mc-agents{padding:0 10px 6px;}
.mc-agents .ag{display:flex;align-items:center;gap:6px;font-size:10px;margin:2px 0;}
.mc-agents .ag-name{width:40px;font-weight:700;color:var(--text);}
.mc-agents .ag-bar{flex:1;height:3px;background:#ffffff10;border-radius:2px;overflow:hidden;}
.mc-agents .ag-fill{height:100%;border-radius:2px;}
.mc-agents .ag-wr{width:32px;text-align:right;font-weight:700;font-size:10px;}
.mc-agents .ag-kd{width:38px;text-align:right;color:var(--text-dim);font-size:10px;}
.mc-nudge{padding:0 10px 4px;}
.mc-nudge .nudge-tag{display:inline-block;padding:3px 8px;font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-radius:2px;color:#000;margin:2px 2px 0 0;}
.mc-incentives{display:flex;gap:4px;padding:2px 10px 8px;flex-wrap:wrap;}
.mc-inc{padding:3px 8px;font-size:10px;font-weight:700;letter-spacing:.5px;border-radius:2px;border:1px solid;}

/* VOTE PROGRESS */
.vote-progress{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:16px 0;}
.vote-dot{display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--panel);border:1px solid #ffffff10;font-size:11px;font-weight:600;}
.vote-dot.voted{border-color:var(--green);color:var(--green);}
.vote-dot.pending{opacity:.4;}
.ban-sequence{display:flex;align-items:center;justify-content:center;gap:3px;margin:16px 0;flex-wrap:wrap;}
.ban-step{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:2px solid;transition:all .3s;}
.ban-step.done{opacity:.5;}
.ban-step.done.team-a-s{border-color:var(--teal);color:var(--teal);background:var(--panel);}
.ban-step.done.team-b-s{border-color:var(--red);color:var(--red);background:var(--panel);}
.ban-step.active-s{animation:pulse 1.5s ease-in-out infinite;}
.ban-step.active-s.team-a-s{border-color:var(--teal);color:var(--teal);box-shadow:0 0 12px var(--teal-dim);}
.ban-step.active-s.team-b-s{border-color:var(--red);color:var(--red);box-shadow:0 0 12px var(--red-dim);}
.ban-step.future-s{border-color:#ffffff15;color:var(--text-dim);opacity:.25;}
.ban-conn{width:12px;height:2px;background:#ffffff10;}
.ban-conn.done{background:var(--teal-dim);}
.roulette-options{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.roulette-card{width:280px;background:var(--panel);border:2px solid #ffffff10;border-radius:6px;overflow:hidden;cursor:pointer;transition:all .35s;}
.roulette-card:hover{border-color:#ffffff30;transform:translateY(-4px);}
.roulette-card.voted{border-color:var(--gold);box-shadow:0 0 24px var(--gold-dim);}
.roulette-card .mc-img{aspect-ratio:16/9;}
.roulette-card .map-label{font-size:16px;padding:12px 16px;text-align:center;}
.result-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;}
.result-tag{font-family:var(--font-label);font-size:12px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;animation:fadeIn .5s ease;}
.result-card{display:inline-block;width:420px;max-width:90vw;border:2px solid var(--gold);border-radius:6px;overflow:hidden;animation:resultReveal .6s cubic-bezier(.16,1,.3,1);box-shadow:0 0 60px var(--gold-dim);}
.result-card img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;}
.result-name{padding:16px;font-family:var(--font-display);font-size:32px;font-weight:900;letter-spacing:4px;text-transform:uppercase;}
.result-detail{margin-top:24px;max-width:500px;font-size:13px;color:var(--text-dim);line-height:1.6;}
.result-history{margin-top:20px;background:var(--panel);border:1px solid #ffffff10;padding:16px;text-align:left;max-width:500px;width:100%;}
.result-history h4{font-family:var(--font-label);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
.history-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid #ffffff08;}
.tally-bar-wrap{display:flex;align-items:center;gap:8px;padding:4px 0;}
.tally-name{width:80px;font-weight:600;font-size:12px;}
.tally-bar{flex:1;height:8px;background:#ffffff08;border-radius:4px;overflow:hidden;}
.tally-bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.tally-count{width:30px;text-align:right;font-weight:700;font-size:12px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
@keyframes resultReveal{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
#toast{position:fixed;top:20px;right:20px;padding:12px 20px;background:var(--panel);border:1px solid var(--red);color:var(--text);font-family:var(--font-label);font-size:12px;font-weight:700;letter-spacing:1px;z-index:9999;transform:translateX(calc(100% + 40px));transition:transform .3s ease;pointer-events:none;}
#toast.show{transform:translateX(0);}
@media(max-width:640px){
  .teams-container{grid-template-columns:1fr;}
  .home-forms{flex-direction:column;align-items:center;}
  .roulette-options{flex-direction:column;align-items:center;}
  .map-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
var socket = io();
var myId = null;
var room = null;
var selectedSystem = 'mapAvoid';
var localSet = new Set();
var localRoulette = null;
var submitted = false;

var ALL = ['Ascent','Haven','Bind','Lotus','Split','Pearl','Sunset','Breeze','Corrode','Abyss','Icebox','Fracture'];

var SYS = {
  mapAvoid:   { name:'Map Avoidance',     icon:'\u2298', desc:'Each player marks maps they want to avoid. Avoided maps are removed from the pool. A random map is selected from whatever remains.' },
  ow2Vote:    { name:'OW2 Voting',        icon:'\u25CE', desc:'Three random maps are offered to the lobby. All players vote for their favorite. Votes become weighted roulette odds \u2014 higher votes = higher chance, but never guaranteed.' },
  curated:    { name:'Curated Selection', icon:'\u2726', desc:'The system surfaces a smaller set of maps for the lobby. Each player selects which maps from that set they\'d play. The most-selected map wins.' },
  cs2Premier: { name:'CS2 Premier',       icon:'\u2694', desc:'Team captains alternate banning maps from the pool until one remains. Strategic elimination \u2014 protect your strengths, target their weaknesses.' }
};

var NL_NAMES = ['Base','+ Stats','+ Nudges','+ Incentives'];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function me(){return room&&room.players.find(function(p){return p.id===myId;});}
function isHost(){return room&&room.host===myId;}
function pName(id){var p=room&&room.players.find(function(p){return p.id===id;});return p?p.name:'???';}
function pTeam(id){var p=room&&room.players.find(function(p){return p.id===id;});return p?p.team:'a';}
function teamLabel(t){return t==='a'?'Team A':'Team B';}
function teamColor(t){return t==='a'?'var(--teal)':'var(--red)';}
function initials(n){return n.slice(0,2).toUpperCase();}
function myStats(){var m=me();return m?m.stats:null;}
function nl(){return(room&&room.config&&room.config.nudgeLevel)||0;}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(function(){t.classList.remove('show');},3000);
}

socket.on('joined',function(d){myId=d.playerId;if(window.history.replaceState)window.history.replaceState({},'',window.location.pathname);render();});
socket.on('room-update',function(d){var prev=room?room.phase:null;room=d;if(room.phase==='playing'&&prev!=='playing'){localSet=new Set();localRoulette=null;submitted=false;}render();});
socket.on('error-msg',function(m){showToast(m);});
socket.on('disconnect',function(){room=null;myId=null;render();showToast('Disconnected from server');});

function render(){
  var app=document.getElementById('app');
  if(!room){app.innerHTML=renderHome();}
  else if(room.phase==='lobby'){app.innerHTML=renderLobby();}
  else if(room.phase==='playing'){app.innerHTML=renderGame();}
  else if(room.phase==='result'){app.innerHTML=renderResult();}
}

function renderHome(){
  var pre=new URLSearchParams(window.location.search).get('room')||'';
  return '<div class="home">'+
    '<div class="home-tag">VALORANT CUSTOM MATCHES</div>'+
    '<div class="home-title">MAP SELECTOR</div>'+
    '<div class="home-sub">Multiplayer map selection for internal playtests</div>'+
    '<div class="home-forms">'+
      '<div class="form-card"><h3>Create Room</h3>'+
        '<label>Your Name</label><input type="text" id="createName" placeholder="Enter name" maxlength="16" autocomplete="off">'+
        '<button class="btn btn-primary" data-action="create-room" style="width:100%">Create</button></div>'+
      '<div class="form-card"><h3>Join Room</h3>'+
        '<label>Room Code</label><input type="text" id="joinCode" class="code-input" placeholder="ABCD" maxlength="4" value="'+esc(pre)+'" autocomplete="off">'+
        '<label>Your Name</label><input type="text" id="joinName" placeholder="Enter name" maxlength="16" autocomplete="off">'+
        '<button class="btn btn-primary" data-action="join-room" style="width:100%">Join</button></div>'+
    '</div></div>';
}

function renderLobby(){

// --- NUDGE LAYER HELPERS ---
function getNudgeBadges(st){
  if(!st)return '';
  var badges=[];
  if(st.streak>=5)badges.push({text:'On Fire: '+st.streak+'W',bg:'var(--orange)'});
  else if(st.reworked)badges.push({text:'Reworked',bg:'var(--teal)'});
  else if(st.isNew)badges.push({text:'New Map',bg:'var(--teal)'});
  else if(st.wr>=55&&st.games>=80)badges.push({text:'High Win Rate',bg:'var(--green)'});
  else if(st.wr>=55)badges.push({text:'Strong Here',bg:'var(--teal)'});
  else if(st.recent>=12)badges.push({text:'Trending Up',bg:'var(--green)'});
  else if(st.enemyWr>=53)badges.push({text:'Enemy Comfort',bg:'var(--red)'});
  else if(st.games<40)badges.push({text:'Low Play Count',bg:'var(--blue)'});
  if(!badges.length)return '';
  return '<div class="mc-badges">'+badges.map(function(b){return '<span class="mc-badge" style="background:'+b.bg+'">'+b.text+'</span>';}).join('')+'</div>';
}

function getIncentiveTags(st){
  if(!st)return '';
  var wr=Math.min(st.wr,st.teamWr||st.wr);
  if(wr>=52&&st.games>=80&&!st.reworked&&!st.isNew)return '';
  var rrVal,rrCol,shVal,shCol;
  if(st.games<20||wr<=35){rrVal=8;rrCol='var(--gold)';}
  else if(wr<=40){rrVal=6;rrCol='var(--gold)';}
  else if(wr<=45){rrVal=5;rrCol='var(--purple)';}
  else if(wr<=50){rrVal=4;rrCol='var(--purple)';}
  else{rrVal=3;rrCol='var(--blue)';}
  if(st.games<20||wr<=37){shVal=5;shCol='var(--green)';}
  else if(wr<=42){shVal=4;shCol='var(--teal)';}
  else if(wr<=47){shVal=3;shCol='var(--teal)';}
  else{shVal=2;shCol='var(--teal)';}
  return '<div class="mc-incentives">'+
    '<span class="mc-inc" style="color:'+rrCol+';border-color:'+rrCol+'">+'+rrVal+' RR</span>'+
    '<span class="mc-inc" style="color:'+shCol+';border-color:'+shCol+'">'+shVal+' RR Shield</span></div>';
}

function mc(name,opts){
  opts=opts||{};
  var cls='map-card';
  if(opts.selected)cls+=' selected';
  if(opts.avoided)cls+=' avoided';
  if(opts.banned)cls+=' banned';
  if(opts.disabled)cls+=' disabled';

  var overlay='';
  if(opts.banned){
    var byTag='';
    if(opts.bannedBy){
      var tc=opts.bannedByTeam==='a'?'team-a-tag':'team-b-tag';
      byTag='<div class="ban-by '+tc+'">'+esc(opts.bannedBy)+'</div>';
    }
    overlay='<div class="ban-overlay"><div class="ban-x">\u2715</div>'+byTag+'</div>';
  }
  var badge='';
  if(opts.selected)badge='<div class="mc-check">\u2713</div>';
  if(opts.avoided)badge='<div class="mc-avoid">\u2715</div>';
  var act=opts.action?' data-action="'+opts.action+'" data-map="'+esc(name)+'"':'';

  // Get player stats for this map
  var st=myStats();
  var ms=st?st[name]:null;
  var level=nl();

  // Nudge badges (level >= 2)
  var nudgeBadges=(level>=2&&ms&&!opts.banned)?getNudgeBadges(ms):'';

  // Stats panel (level >= 1)
  var statsHtml='';
  if(level>=1&&ms&&!opts.banned){
    var wrC=ms.wr>=55?'high':ms.wr<45?'low':'';
    var twrC=ms.teamWr>=55?'high':ms.teamWr<45?'low':'';
    statsHtml='<div class="mc-stats">'+
      '<div class="sr"><span>Your WR</span><span class="sv '+wrC+'">'+ms.wr+'%</span></div>'+
      '<div class="sr"><span>Games</span><span class="sv">'+ms.games+'</span></div>'+
      '<div class="sr"><span>Ally WR</span><span class="sv '+twrC+'">'+ms.teamWr+'%</span></div>'+
      '<div class="sr"><span>Enemy WR</span><span class="sv '+(ms.enemyWr>=53?'low':'')+'">'+ms.enemyWr+'%</span></div>'+
      '<div class="sr"><span>Ally PR</span><span class="sv">'+ms.teamPr+'%</span></div>'+
      '<div class="sr"><span>Enemy PR</span><span class="sv">'+ms.enemyPr+'%</span></div>'+
    '</div>';
    // Agent stats
    if(ms.agents&&ms.agents.length){
      var maxWr=ms.agents[0].wr;
      statsHtml+='<div class="mc-agents">'+
        '<div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:3px;padding:0 0 2px;border-top:1px solid #ffffff08;padding-top:4px">Your Agents</div>'+
        ms.agents.map(function(a){
          var col=a.wr>=55?'var(--green)':a.wr>=45?'var(--text)':'var(--red)';
          var barW=Math.round(a.wr/maxWr*100);
          return '<div class="ag"><span class="ag-name">'+esc(a.name)+'</span>'+
            '<div class="ag-bar"><div class="ag-fill" style="width:'+barW+'%;background:'+col+'"></div></div>'+
            '<span class="ag-wr" style="color:'+col+'">'+a.wr+'%</span>'+
            '<span class="ag-kd">'+a.kd+' KD</span></div>';
        }).join('')+'</div>';
    }
  }

  // Nudge tags (level >= 2)
  var nudgeHtml='';
  // already shown as badges on image

  // Incentives (level >= 3)
  var incHtml=(level>=3&&ms&&!opts.banned)?getIncentiveTags(ms):'';

  return '<div class="'+cls+'"'+act+'><div class="mc-img">'+
    '<img src="/maps/'+encodeURIComponent(name)+'.png" alt="'+esc(name)+'" loading="lazy">'+
    badge+overlay+nudgeBadges+'</div>'+
    '<div class="map-label">'+esc(name)+'</div>'+

// -- CS2 PREMIER --
// --- RADAR CHART ---
function radarChart(ms,sz){
  if(!ms)return '';
  var axes=[
    {l:'WR',v:ms.wr/100},
    {l:'EXP',v:Math.min(ms.games/150,1)},
    {l:'TEAM',v:ms.teamWr/100},
    {l:'AGENT',v:(ms.agents&&ms.agents[0]?ms.agents[0].wr:50)/100},
    {l:'FORM',v:Math.min(ms.recent/15,1)}
  ];
  var cx=sz/2,cy=sz/2,r=sz/2-16,n=axes.length;
  var gridSvg='';
  [0.25,0.5,0.75,1].forEach(function(sc){
    var pts=[];
    for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;pts.push((cx+r*sc*Math.cos(a)).toFixed(1)+','+(cy+r*sc*Math.sin(a)).toFixed(1));}
    gridSvg+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="#ffffff08" stroke-width="0.5"/>';
  });
  var axLines='';
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;axLines+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="#ffffff0a" stroke-width="0.5"/>';}
  var pts=[];
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;var v=Math.max(axes[i].v,0.05);pts.push((cx+r*v*Math.cos(a)).toFixed(1)+','+(cy+r*v*Math.sin(a)).toFixed(1));}
  var labels='';
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;var lx=cx+(r+11)*Math.cos(a);var ly=cy+(r+11)*Math.sin(a);
    labels+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" fill="#8b8577" font-size="6" font-weight="700" font-family="Urbanist,sans-serif" letter-spacing="0.5">'+axes[i].l+'</text>';}
  // Dots at vertices
  var dots='';
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;var v=Math.max(axes[i].v,0.05);
    dots+='<circle cx="'+(cx+r*v*Math.cos(a)).toFixed(1)+'" cy="'+(cy+r*v*Math.sin(a)).toFixed(1)+'" r="2" fill="var(--teal)"/>';}
  return '<svg viewBox="0 0 '+sz+' '+sz+'" width="'+sz+'" height="'+sz+'" style="display:block;margin:0 auto;">'+
    gridSvg+axLines+
    '<polygon points="'+pts.join(' ')+'" fill="#17dec518" stroke="var(--teal)" stroke-width="1.5" stroke-linejoin="round"/>'+
    dots+labels+'</svg>';
}

          '<span style="font-size:15px;letter-spacing:3px">ATTACK</span><span style="font-size:8px;letter-spacing:1px;opacity:.7">START ON ATTACK SIDE</span></button>'+
        '<button class="btn btn-lg" data-action="pick-side" data-side="defend" style="background:var(--teal);border-color:var(--teal);color:#000;min-width:160px;flex-direction:column;gap:4px;padding:18px 32px">'+
          '<span style="font-size:15px;letter-spacing:3px">DEFEND</span><span style="font-size:8px;letter-spacing:1px;opacity:.5">START ON DEFEND SIDE</span></button>'+
      '</div>'
      :'<div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-dim);animation:pulse 2s ease-in-out infinite">Waiting for '+sidePickTeamLabel+' captain to pick starting side...</div>';
    // Ban history summary
    var banSummary=banned.map(function(b,i){
      var team=pTeam(b.by);var col=teamColor(team);
      return '<span style="padding:3px 10px;font-size:10px;font-weight:700;text-decoration:line-through;color:'+col+';border:1px solid '+col+';opacity:.5;border-radius:2px">'+esc(b.map)+'</span>';
    }).join('');
    return '<div class="game-screen"><div class="game-header">'+
      '<div class="game-system-name">SIDE SELECT</div>'+
      '<div class="game-status">'+sidePickTeamLabel+' picks starting side</div></div>'+
      '<div style="text-align:center;padding:20px 0">'+
        '<div style="display:inline-block;width:360px;max-width:90vw;border:2px solid var(--gold);border-radius:6px;overflow:hidden;box-shadow:0 0 40px var(--gold-dim)">'+
          '<img src="/maps/'+encodeURIComponent(s.result)+'.png" style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover">'+
          '<div style="padding:14px;background:var(--panel)">'+
            '<div style="font-family:var(--font-display);font-size:24px;font-weight:900;letter-spacing:3px;text-transform:uppercase">'+esc(s.result)+'</div>'+
            '<div style="font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:4px">FINAL MAP</div>'+
          '</div>'+
        '</div>'+
        (radar?'<div style="margin-top:16px">'+radar+'<div style="font-size:8px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:4px">YOUR STATS ON THIS MAP</div></div>':'')+
      '</div>'+
      sideButtons+
      '<div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:20px">'+banSummary+'</div>'+
    '</div>';
  }

  // --- BAN PHASE ---
  var currentBanner=banOrder[banIndex];
  var isMyTurn=currentBanner===myId;

  // Phase sequence with labels
  var totalBans=banOrder.length;
  var phaseDots='';
  // Show: Ban 1, Ban 2, ... Ban N, Map, Side
  var allPhases=[];
  for(var i=0;i<totalBans;i++){
    var team=pTeam(banOrder[i]);
    allPhases.push({team:team,type:'ban',i:i});
  }
  allPhases.push({type:'map'});
  allPhases.push({type:'side'});

  var seq=allPhases.map(function(p,idx){
    var cls,icon,label='';
    if(p.type==='ban'){
      if(p.i<banIndex){cls='ban-step done team-'+p.team+'-s';icon='\u2713';}
      else if(p.i===banIndex){cls='ban-step active-s team-'+p.team+'-s';icon=String(p.i+1);}
      else{cls='ban-step future-s';icon=String(p.i+1);}
    }else if(p.type==='map'){
      cls='ban-step future-s';icon='\u2691';
      if(pPhase==='sidePick')cls='ban-step done team-a-s';
    }else{
      cls='ban-step future-s';icon='\u2694';
    }
    var conn=idx<allPhases.length-1?'<div class="ban-conn '+(p.type==='ban'&&p.i<banIndex?'done':'')+'"></div>':'';
    return '<div class="'+cls+'">'+icon+'</div>'+conn;
  }).join('');

  var turnHtml=isMyTurn
    ?'<div class="turn-banner your-turn">YOUR TURN \u2014 BAN A MAP</div>'
    :'<div class="turn-banner waiting">WAITING FOR '+esc(pName(currentBanner)).toUpperCase()+' TO BAN</div>';

  // Map grid with radar charts
  var grid=pool.map(function(m){
    var ban=banned.find(function(b){return b.map===m;});
    if(ban)return mc(m,{banned:true,bannedBy:pName(ban.by),bannedByTeam:pTeam(ban.by)});
    // For unbanned cards in CS2 Premier, add radar chart
    var ms=st?st[m]:null;
    var radarHtml=(level>=1&&ms)?'<div style="padding:4px 10px 8px">'+radarChart(ms,100)+'</div>':'';
    var cardHtml=mc(m,{action:isMyTurn?'ban-map':null,disabled:!isMyTurn});
    // Inject radar before closing </div>
    if(radarHtml){
      cardHtml=cardHtml.slice(0,-6)+radarHtml+'</div>';
    }
    return cardHtml;
  }).join('');

  var remaining=pool.length-banned.length;
  return '<div class="game-screen"><div class="game-header">'+
    '<div class="game-system-name">CS2 PREMIER</div>'+
    '<div class="game-status">Ban '+(banIndex+1)+' of '+totalBans+' \u00B7 '+remaining+' maps remaining</div></div>'+
    nudgeBar()+'<div class="ban-sequence">'+seq+'</div>'+turnHtml+
    '<div class="map-grid">'+grid+'</div></div>';
}

// -- RESULT --
function renderResult(){
  var s=room.state;
  var result=s.result;
  var host=isHost();
  var sysName=SYS[room.system]?SYS[room.system].name:'';
  var detail='';

  if(room.system==='mapAvoid'&&s.avoidCounts){
    var avoidEntries=Object.entries(s.avoidCounts).sort(function(a,b){return b[1]-a[1];});
    var remaining=s.remaining||[];
    detail='<div class="result-history"><h4>Avoidance Summary</h4>'+
      avoidEntries.map(function(e){
        return '<div class="history-item"><span style="color:var(--red);font-weight:700">\u2715</span> <strong>'+esc(e[0])+'</strong> <span style="color:var(--text-dim);margin-left:auto">'+e[1]+' avoided</span></div>';
      }).join('')+
      '<div style="font-size:11px;color:var(--green);margin-top:10px">'+remaining.length+' maps remained. Winner selected randomly.</div></div>';
  }
  if(room.system==='ow2Vote'&&s.weights){
    var total=Object.values(s.weights).reduce(function(a,b){return a+b;},0);
    detail='<div class="result-history"><h4>Roulette Odds</h4>'+
      (s.options||[]).map(function(m){
        var w=s.weights[m]||0;var pct=Math.round(w/total*100);
        var isW=m===result;var col=isW?'var(--gold)':'var(--teal)';
        return '<div class="tally-bar-wrap"><span class="tally-name" style="'+(isW?'color:var(--gold)':'')+'">'+esc(m)+'</span>'+
          '<div class="tally-bar"><div class="tally-bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
          '<span class="tally-count" style="'+(isW?'color:var(--gold)':'')+'">'+pct+'%</span></div>';
      }).join('')+'</div>';
  }
  if(room.system==='curated'&&s.tally){
    var sorted=Object.entries(s.tally).sort(function(a,b){return b[1]-a[1];});
    var maxV=sorted[0]?sorted[0][1]:1;
    detail='<div class="result-history"><h4>Vote Tally</h4>'+
      sorted.map(function(e){
        var map=e[0],count=e[1];var pct=Math.round(count/maxV*100);
        var isW=map===result;var col=isW?'var(--gold)':'var(--teal)';
        return '<div class="tally-bar-wrap"><span class="tally-name" style="'+(isW?'color:var(--gold)':'')+'">'+esc(map)+'</span>'+
          '<div class="tally-bar"><div class="tally-bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
          '<span class="tally-count" style="'+(isW?'color:var(--gold)':'')+'">'+count+'</span></div>';
      }).join('')+'</div>';
  }
  if(room.system==='cs2Premier'&&s.banned){
    var sideHtml='';
    if(s.side){
      var sideLabel=s.side==='attack'?'ATTACKING':'DEFENDING';
      var sideCol=s.side==='attack'?'var(--red)':'var(--teal)';
      var sideTeamLabel=s.sidePickTeam==='a'?'Team A':'Team B';
      sideHtml='<div style="margin-top:12px;padding:12px 16px;background:var(--panel);border:1px solid '+sideCol+';display:flex;align-items:center;justify-content:center;gap:12px">'+
        '<span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)">Starting Side</span>'+
        '<span style="font-size:18px;font-weight:900;letter-spacing:3px;color:'+sideCol+'">'+sideLabel+'</span>'+
        '<span style="font-size:9px;color:var(--text-dim)">(picked by '+sideTeamLabel+')</span></div>';
    }
    detail=sideHtml+'<div class="result-history"><h4>Ban History</h4>'+
      s.banned.map(function(b,i){
        var team=pTeam(b.by);
        return '<div class="history-item"><span style="width:24px;color:var(--text-dim);font-size:10px">'+(i+1)+'</span>'+
          '<span style="color:'+teamColor(team)+';font-weight:700;font-size:11px;min-width:55px">'+teamLabel(team)+'</span>'+
          '<span>banned <strong>'+esc(b.map)+'</strong></span></div>';
      }).join('')+'</div>';
  }
  var backBtn=host
    ?'<div style="margin-top:24px"><button class="btn btn-lg btn-outline" data-action="back-to-lobby">RETURN TO LOBBY</button></div>'
    :'<div style="margin-top:24px;font-size:12px;color:var(--text-dim)">Waiting for host to return to lobby...</div>';
  return '<div class="result-screen">'+
    '<div class="result-tag">MAP SELECTED \u00B7 '+sysName.toUpperCase()+'</div>'+
    '<div class="result-card"><img src="/maps/'+encodeURIComponent(result)+'.png" alt="'+esc(result)+'">'+
      '<div class="result-name">'+esc(result)+'</div></div>'+
    detail+backBtn+'</div>';
}

// === EVENTS ===
document.getElementById('app').addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.dataset.action;
  switch(action){
    case 'create-room':{
      var n=(document.getElementById('createName')||{}).value;
      n=n?n.trim():'';
      if(!n)return showToast('Enter your name');
      socket.emit('create-room',{name:n});break;
    }
    case 'join-room':{
      var code=(document.getElementById('joinCode')||{}).value;
      var jn=(document.getElementById('joinName')||{}).value;
      code=code?code.trim():'';jn=jn?jn.trim():'';
      if(!code||code.length<4)return showToast('Enter a 4-character room code');
      if(!jn)return showToast('Enter your name');
      socket.emit('join-room',{code:code,name:jn});break;
    }
    case 'copy-code':
      if(navigator.clipboard&&room)navigator.clipboard.writeText(room.code);
      showToast('Code copied!');break;
    case 'copy-link':
      if(navigator.clipboard&&room)navigator.clipboard.writeText(window.location.origin+'?room='+room.code);
      showToast('Link copied!');break;
    case 'set-team':
      socket.emit('set-team',{playerId:el.dataset.player,team:el.dataset.team});break;
    case 'set-captain':
      socket.emit('set-captain',{playerId:el.dataset.player});break;
    case 'select-system':
      selectedSystem=el.dataset.system;render();break;
    case 'set-pool':
      socket.emit('update-config',{poolSize:parseInt(el.dataset.size)});break;
    case 'set-avoids':
      socket.emit('update-config',{maxAvoids:parseInt(el.dataset.n)});break;
    case 'set-curated':
      socket.emit('update-config',{curatedSize:parseInt(el.dataset.n)});break;
    case 'set-nudge':
      socket.emit('update-config',{nudgeLevel:parseInt(el.dataset.n)});break;
    case 'start-game':
      socket.emit('start-system',{system:selectedSystem});break;
    case 'toggle-sel':{
      var m=el.dataset.map;
      if(localSet.has(m))localSet.delete(m);else localSet.add(m);
      render();break;
    }
    case 'toggle-avoid':{
      var ma=el.dataset.map;
      var maxA=(room.state&&room.state.maxAvoids)||2;
      if(localSet.has(ma))localSet.delete(ma);
      else if(localSet.size<maxA)localSet.add(ma);
      render();break;
    }
    case 'submit-vote':
      if(localSet.size===0)return;
      socket.emit('action',{action:'vote',maps:Array.from(localSet)});
      submitted=true;render();break;
    case 'submit-avoids':
      socket.emit('action',{action:'avoid',maps:Array.from(localSet)});
      submitted=true;render();break;
    case 'ban-map':
      socket.emit('action',{action:'ban',map:el.dataset.map});break;
    case 'pick-side':
      socket.emit('action',{action:'pick-side',side:el.dataset.side});break;
    case 'vote-roulette':{
      var rm=el.dataset.map;
      localRoulette=rm;
      socket.emit('action',{action:'vote',map:rm});
      render();break;
    }
    case 'back-to-lobby':
      socket.emit('reset');break;
  }
});

document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  if(e.target.id==='createName'){var b=document.querySelector('[data-action="create-room"]');if(b)b.click();}
  if(e.target.id==='joinName'||e.target.id==='joinCode'){var b2=document.querySelector('[data-action="join-room"]');if(b2)b2.click();}
});

render();
</script>
